name: Performance regressions

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance:
    name: Node and Chromium budgets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: tests

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install locked test dependencies
        run: npm ci

      - name: Validate performance CI wiring
        run: node unit/performance-ci.unit.js

      - name: Run portable performance budgets
        run: npm run perf:ci:node
        env:
          CI: true

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Chromium interaction budgets
        run: npm run perf:ci:browser
        env:
          CI: true

      - name: Preserve performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wormholes-performance-reports
          path: |
            tests/performance/results/
            tests/playwright-report/
            tests/test-results/
          if-no-files-found: ignore
          retention-days: 30
