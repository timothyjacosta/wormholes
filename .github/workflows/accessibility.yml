name: Accessibility checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: accessibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility:
    name: Axe scans (desktop)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: tests

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install locked test dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run accessibility gate
        run: npm run ci:accessibility
        env:
          CI: true

      - name: Preserve accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-playwright-report
          path: tests/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
